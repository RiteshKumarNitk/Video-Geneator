version: '3.8'

services:
  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: videobg_python_ai
    restart: always
    environment:
      - PORT=8000
    volumes:
      - shared_storage:/app/shared-storage
    ports:
      - "8000:8000"
    networks:
      - videobg_network

  nextjs:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: videobg_nextjs
    restart: always
    environment:
      - PYTHON_AI_URL=http://python-ai:8000
      - NODE_ENV=production
      - PORT=3000
      - SHARED_STORAGE_PATH=/app/shared-storage
    volumes:
      - shared_storage:/app/shared-storage
    ports:
      - "3000:3000"
    depends_on:
      - python-ai
    networks:
      - videobg_network

  nginx:
    image: nginx:alpine
    container_name: videobg_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared_storage:/app/shared-storage:ro
    depends_on:
      - nextjs
      - python-ai
    networks:
      - videobg_network

volumes:
  shared_storage:

networks:
  videobg_network:
    driver: bridge
